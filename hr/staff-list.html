<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ一覧 — cura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --dark:#2a1f1a; --rose:#8a3a55; --gold:#c9a882; --cream:#faf7f2; --border:#d8cec6; --text:#2a1f1a; --text-mid:#5c4a40; --text-light:#9c8a7e; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Serif JP',serif; background:var(--cream); color:var(--text); font-size:14px; line-height:1.9; padding:20px 16px 80px; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:780px; margin:0 auto; }
    .page-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:28px; padding-bottom:14px; border-bottom:1px solid var(--border); }
    .logo { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--rose); letter-spacing:0.15em; }
    .logo-sub { font-size:8px; letter-spacing:0.3em; color:var(--text-light); font-family:'Cormorant Garamond',serif; margin-top:2px; }
    .header-actions { display:flex; gap:10px; align-items:center; }
    .btn-primary { background:var(--rose); color:#fff; border:none; padding:9px 18px; font-family:'Noto Serif JP',serif; font-size:12px; letter-spacing:0.1em; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-secondary { background:#fff; color:var(--text-mid); border:1px solid var(--border); padding:9px 14px; font-family:'Noto Serif JP',serif; font-size:12px; letter-spacing:0.08em; cursor:pointer; text-decoration:none; display:inline-block; }
    .stats-row { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .stat-box { flex:1; min-width:100px; background:#fff; border:1px solid var(--border); padding:14px 16px; text-align:center; }
    .stat-num { font-family:'Cormorant Garamond',serif; font-size:32px; color:var(--rose); line-height:1; }
    .stat-label { font-size:9px; color:var(--text-light); letter-spacing:0.15em; margin-top:4px; }
    .staff-card { background:#fff; border:1px solid var(--border); padding:18px 20px; margin-bottom:12px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:border-color 0.15s; text-decoration:none; color:inherit; }
    .staff-card:hover { border-color:var(--rose); }
    .avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#8a3a55,#b87888); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:20px; color:#fff; flex-shrink:0; }
    .card-info { flex:1; min-width:0; }
    .card-name { font-size:15px; font-weight:500; letter-spacing:0.05em; }
    .card-meta { font-size:11px; color:var(--text-light); margin-top:2px; letter-spacing:0.08em; }
    .badge { display:inline-block; font-size:9.5px; padding:2px 7px; border:1px solid var(--rose); color:var(--rose); letter-spacing:0.1em; margin-left:6px; vertical-align:middle; }
    .card-arrow { color:var(--text-light); font-size:16px; flex-shrink:0; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-light); }
    .empty-state a { color:var(--rose); }
    .section-label { font-size:9.5px; letter-spacing:0.25em; color:var(--gold); font-family:'Cormorant Garamond',serif; text-transform:uppercase; margin-bottom:12px; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div>
      <div class="logo">cura</div>
      <div class="logo-sub">Staff Management</div>
    </div>
    <div class="header-actions">
      <a href="../ops/dashboard.html" class="btn-secondary">ダッシュボード</a>
      <a href="employment-contract.html" class="btn-primary">＋ 新規契約</a>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-total">0</div><div class="stat-label">スタッフ数</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-employee">0</div><div class="stat-label">雇用</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-contract">0</div><div class="stat-label">業務委託</div></div>
  </div>

  <div class="section-label">Staff — スタッフ一覧</div>
  <div id="staff-list"></div>

</div>
<script>
  const allStaff = JSON.parse(localStorage.getItem('cura_staff') || '[]');

  document.getElementById('stat-total').textContent = allStaff.length;
  document.getElementById('stat-employee').textContent = allStaff.filter(s => s.contractType !== '業務委託').length;
  document.getElementById('stat-contract').textContent = allStaff.filter(s => s.contractType === '業務委託').length;

  const list = document.getElementById('staff-list');
  if (allStaff.length === 0) {
    list.innerHTML = `<div class="empty-state">スタッフがまだ登録されていません。<br><a href="employment-contract.html">雇用契約書から登録する →</a></div>`;
  } else {
    // 新しい順
    [...allStaff].reverse().forEach(staff => {
      const extra = JSON.parse(localStorage.getItem('cura_extra_' + staff.id) || '{"shifts":[]}');
      const totalShifts = extra.shifts.length;
      const a = document.createElement('a');
      a.className = 'staff-card';
      a.href = 'staff-profile.html?id=' + staff.id;
      a.innerHTML = `
        <div class="avatar">${staff.name.slice(0,1)}</div>
        <div class="card-info">
          <div class="card-name">${staff.name}<span class="badge">${staff.contractType}</span></div>
          <div class="card-meta">入社 ${staff.contractStart || '—'}　稼働 ${totalShifts}回　${staff.jobTitle || ''}</div>
        </div>
        <div class="card-arrow">›</div>
      `;
      list.appendChild(a);
    });
  }
</script>
</body>
</html>
