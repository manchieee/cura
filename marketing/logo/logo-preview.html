<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cura ロゴ案</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0eb;
    font-family: 'Noto Serif JP', serif;
    padding: 60px 40px;
  }
  h1 {
    text-align: center;
    color: #2a1f1a;
    font-size: 14px;
    letter-spacing: 0.3em;
    margin-bottom: 60px;
    font-weight: 300;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border-radius: 4px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 2px 20px rgba(42,31,26,0.06);
  }
  .card.dark {
    background: #2a1f1a;
  }
  .label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #999;
    text-transform: uppercase;
    align-self: flex-start;
  }
  .card.dark .label { color: #666; }

  /* --- A: テキストのみ・グラデーション --- */
  .logo-a {
    font-family: 'Abril Fatface', serif;
    font-size: 72px;
    background: linear-gradient(135deg, #8a3a55 0%, #a85f78 50%, #c9a882 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
    line-height: 1;
  }
  .logo-a-sub {
    font-size: 10px;
    letter-spacing: 0.45em;
    color: #c9a882;
    font-weight: 300;
  }

  /* --- B: ラインアクセント --- */
  .logo-b-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .logo-b {
    font-family: 'Abril Fatface', serif;
    font-size: 64px;
    color: #8a3a55;
    letter-spacing: 0.08em;
    line-height: 1;
  }
  .logo-b-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, #c9a882, transparent);
  }
  .logo-b-sub {
    font-size: 9px;
    letter-spacing: 0.55em;
    color: #a85f78;
    font-weight: 300;
  }

  /* --- C: ダーク背景・ゴールド --- */
  .logo-c {
    font-family: 'Abril Fatface', serif;
    font-size: 72px;
    color: #c9a882;
    letter-spacing: 0.06em;
    line-height: 1;
  }
  .logo-c-sub {
    font-size: 10px;
    letter-spacing: 0.45em;
    color: #a85f78;
    font-weight: 300;
  }
  .logo-c-line {
    width: 40px;
    height: 1px;
    background: #c9a882;
    opacity: 0.5;
  }

  /* --- D: ボックス囲み --- */
  .logo-d-wrap {
    border: 1px solid #c9a882;
    padding: 20px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .logo-d-wrap::before,
  .logo-d-wrap::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-color: #8a3a55;
    border-style: solid;
  }
  .logo-d-wrap::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }
  .logo-d-wrap::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }
  .logo-d {
    font-family: 'Abril Fatface', serif;
    font-size: 60px;
    color: #2a1f1a;
    letter-spacing: 0.1em;
    line-height: 1;
  }
  .logo-d-sub {
    font-size: 8px;
    letter-spacing: 0.5em;
    color: #c9a882;
    font-weight: 300;
  }

  .download-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 60px;
  }
  button {
    padding: 10px 24px;
    font-size: 11px;
    letter-spacing: 0.2em;
    border: 1px solid #8a3a55;
    background: transparent;
    color: #8a3a55;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    transition: all 0.2s;
  }
  button:hover {
    background: #8a3a55;
    color: white;
  }
</style>
</head>
<body>

<h1>C U R A　ロゴ案</h1>

<div class="grid">

  <!-- A -->
  <div class="card">
    <span class="label">A — グラデーション</span>
    <div class="logo-a">cura</div>
    <div class="logo-a-sub">PRIVATE CARE SERVICE</div>
  </div>

  <!-- B -->
  <div class="card">
    <span class="label">B — ラインアクセント</span>
    <div class="logo-b-wrap">
      <div class="logo-b">cura</div>
      <div class="logo-b-line"></div>
      <div class="logo-b-sub">PRIVATE CARE SERVICE</div>
    </div>
  </div>

  <!-- C -->
  <div class="card dark">
    <span class="label">C — ダーク × ゴールド</span>
    <div class="logo-c">cura</div>
    <div class="logo-c-line"></div>
    <div class="logo-c-sub">PRIVATE CARE SERVICE</div>
  </div>

  <!-- D -->
  <div class="card">
    <span class="label">D — ボックスフレーム</span>
    <div class="logo-d-wrap">
      <div class="logo-d">cura</div>
      <div class="logo-d-sub">PRIVATE CARE SERVICE</div>
    </div>
  </div>

</div>

<div class="download-row">
  <button onclick="downloadSVG('A')">A を SVG 保存</button>
  <button onclick="downloadSVG('B')">B を SVG 保存</button>
  <button onclick="downloadSVG('C')">C を SVG 保存</button>
  <button onclick="downloadSVG('D')">D を SVG 保存</button>
</div>

<script>
const svgs = {
  A: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a3a55"/>
      <stop offset="50%" stop-color="#a85f78"/>
      <stop offset="100%" stop-color="#c9a882"/>
    </linearGradient>
    <style>@import url('https://fonts.googleapis.com/css2?family=Abril+Fatface&amp;display=swap');</style>
  </defs>
  <text x="160" y="108" font-family="'Abril Fatface', Georgia, serif" font-size="96" fill="url(#gA)" text-anchor="middle" letter-spacing="4">cura</text>
  <text x="160" y="135" font-family="Georgia, serif" font-size="10" fill="#c9a882" text-anchor="middle" letter-spacing="5">PRIVATE CARE SERVICE</text>
</svg>`,

  B: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <text x="160" y="100" font-family="'Abril Fatface', Georgia, serif" font-size="84" fill="#8a3a55" text-anchor="middle" letter-spacing="5">cura</text>
  <line x1="60" y1="115" x2="260" y2="115" stroke="#c9a882" stroke-width="0.5"/>
  <text x="160" y="132" font-family="Georgia, serif" font-size="9" fill="#a85f78" text-anchor="middle" letter-spacing="5">PRIVATE CARE SERVICE</text>
</svg>`,

  C: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <rect width="320" height="160" fill="#2a1f1a"/>
  <text x="160" y="105" font-family="'Abril Fatface', Georgia, serif" font-size="90" fill="#c9a882" text-anchor="middle" letter-spacing="4">cura</text>
  <line x1="140" y1="118" x2="180" y2="118" stroke="#c9a882" stroke-width="0.5" opacity="0.5"/>
  <text x="160" y="135" font-family="Georgia, serif" font-size="9" fill="#a85f78" text-anchor="middle" letter-spacing="5">PRIVATE CARE SERVICE</text>
</svg>`,

  D: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <rect x="60" y="20" width="200" height="120" fill="none" stroke="#c9a882" stroke-width="0.8"/>
  <line x1="60" y1="20" x2="70" y2="20" stroke="#8a3a55" stroke-width="2"/>
  <line x1="60" y1="20" x2="60" y2="30" stroke="#8a3a55" stroke-width="2"/>
  <line x1="260" y1="140" x2="250" y2="140" stroke="#8a3a55" stroke-width="2"/>
  <line x1="260" y1="140" x2="260" y2="130" stroke="#8a3a55" stroke-width="2"/>
  <text x="160" y="100" font-family="'Abril Fatface', Georgia, serif" font-size="72" fill="#2a1f1a" text-anchor="middle" letter-spacing="6">cura</text>
  <text x="160" y="122" font-family="Georgia, serif" font-size="8" fill="#c9a882" text-anchor="middle" letter-spacing="5">PRIVATE CARE SERVICE</text>
</svg>`
};

function downloadSVG(id) {
  const svg = svgs[id];
  const blob = new Blob([svg], {type: 'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cura-logo-${id}.svg`;
  a.click();
}
</script>
</body>
</html>
