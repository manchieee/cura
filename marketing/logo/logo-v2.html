<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f4efe9;
  font-family: 'Noto Serif JP', serif;
  padding: 48px 32px 80px;
}
h1 {
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.4em;
  color: #8a6a5a;
  margin-bottom: 8px;
  font-weight: 300;
}
.subtitle {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #bba;
  margin-bottom: 56px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  max-width: 860px;
  margin: 0 auto;
}
.card {
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px 36px;
  min-height: 220px;
  position: relative;
  gap: 20px;
}
.card.dark { background: #2a1f1a; }
.card.rose { background: #8a3a55; }
.card.cream { background: #faf6f0; }
.num {
  position: absolute;
  top: 14px; left: 18px;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: #ccc;
}
.card.dark .num, .card.rose .num { color: #555; }
.dl-btn {
  position: absolute;
  bottom: 12px; right: 14px;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: #c9a882;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  opacity: 0.7;
}
.dl-btn:hover { opacity: 1; }
</style>

<p class="subtitle">MiuMiu インスパイア・10案</p>

<div class="grid">

<!-- 01 ファッションハウス風 ALL CAPS -->
<div class="card cream" id="c1">
  <span class="num">01</span>
  <svg width="260" height="120" viewBox="0 0 260 120">
    <text x="130" y="72" font-family="'Cormorant Garamond', Georgia, serif" font-size="64" font-weight="300" fill="#2a1f1a" text-anchor="middle" letter-spacing="18">CURA</text>
    <line x1="40" y1="84" x2="220" y2="84" stroke="#c9a882" stroke-width="0.6"/>
    <text x="130" y="100" font-family="Georgia, serif" font-size="8" fill="#c9a882" text-anchor="middle" letter-spacing="6">PRIVATE CARE</text>
  </svg>
  <button class="dl-btn" onclick="dl(1)">SVG保存</button>
</div>

<!-- 02 Cモノグラム + wordmark -->
<div class="card" id="c2">
  <span class="num">02</span>

  <button class="dl-btn" onclick="dl(2)">SVG保存</button>
</div>

<!-- 03 ダイヤモンドマーク -->
<div class="card dark" id="c3">
